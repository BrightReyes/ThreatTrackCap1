<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Incidents</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="/assets/image 10.png"
            sizes="32x32"
        />
        <link rel="stylesheet" href="/css/base.css" />
        <link rel="stylesheet" href="/css/dashboard.css" />
        <link rel="stylesheet" href="/css/incidents.css" />
    </head>
    <body>
        <div id="page-incidents" class="admin-dashboard" hidden>
            <aside
                class="admin-dashboard__sidebar"
                aria-label="Main navigation"
            >
                <div class="sidebar__top">
                    <div class="sidebar__brand">
                        <span class="sidebar__logo"></span>
                        <span class="sidebar__badge">Admin</span>
                    </div>
                    <nav class="sidebar__nav">
                        <a href="dashboard.html" class="sidebar__link"
                            >Dashboard</a
                        >
                        <a
                            href="incidents.html"
                            class="sidebar__link sidebar__link--active"
                            aria-current="page"
                            >Incidents</a
                        >
                        <a href="users.html" class="sidebar__link">Users</a>
                        <a href="notifications.html" class="sidebar__link"
                            >Notifications</a
                        >
                        <a href="settings.html" class="sidebar__link"
                            >Settings</a
                        >
                    </nav>
                </div>

                <div class="sidebar__footer">
                    <span id="user-email" class="sidebar__user-email"></span>
                    <button
                        type="button"
                        id="btn-signout"
                        class="sidebar__signout"
                    >
                        Sign out
                    </button>
                </div>
            </aside>

            <div class="admin-dashboard__shell">
                <header class="admin-dashboard__header">
                    <div class="admin-dashboard__header-left">
                        <h1 class="admin-dashboard__title">Incidents</h1>
                        <p class="admin-dashboard__tagline">
                            Review and moderate reported incidents
                        </p>
                    </div>
                    <div class="admin-dashboard__header-right">
                        <div
                            class="admin-dashboard__clock"
                            role="timer"
                            aria-label="Current time, Philippines (PHT)"
                        >
                            <div class="admin-dashboard__clock-line">
                                <time
                                    id="dashboard-clock-time"
                                    class="admin-dashboard__clock-time"
                                ></time>
                                <span
                                    class="admin-dashboard__clock-sep"
                                    aria-hidden="true"
                                    >·</span
                                >
                                <span class="admin-dashboard__clock-tz"
                                    >PHT</span
                                >
                            </div>
                            <p
                                id="dashboard-clock-date"
                                class="admin-dashboard__clock-date"
                            ></p>
                        </div>
                    </div>
                </header>

                <main class="admin-dashboard__main incidents-main">
                    <div class="incidents-toolbar">
                        <div class="incidents-toolbar__search">
                            <label
                                class="visually-hidden"
                                for="incidents-search"
                                >Search incidents</label
                            >
                            <input
                                id="incidents-search"
                                type="search"
                                class="incidents-search-input"
                                placeholder="Search by code, type, description…"
                                autocomplete="off"
                            />
                        </div>
                        <div class="incidents-toolbar__filters">
                            <select
                                id="incidents-filter-status"
                                class="incidents-select"
                                aria-label="Status filter"
                            >
                                <option value="all">All statuses</option>
                            </select>
                            <select
                                id="incidents-filter-severity"
                                class="incidents-select"
                                aria-label="Severity filter"
                            >
                                <option value="all">All severities</option>
                            </select>
                        </div>
                    </div>

                    <section class="incidents-panel" aria-label="Incident list">
                        <div class="incidents-panel__head">
                            <h2 class="incidents-panel__title">
                                All incidents
                            </h2>
                            <p
                                class="incidents-panel__meta"
                                id="incidents-count"
                            >
                                Loading…
                            </p>
                        </div>

                        <div class="incidents-table-wrap">
                            <table class="incidents-table">
                                <thead>
                                    <tr>
                                        <th scope="col">Code</th>
                                        <th scope="col">Reported</th>
                                        <th scope="col">Type</th>
                                        <th scope="col">Severity</th>
                                        <th scope="col">Status</th>
                                        <th scope="col">Description</th>
                                        <th scope="col">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="incidents-tbody">
                                    <tr class="incidents-table__empty">
                                        <td colspan="7">Loading…</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </main>
            </div>
        </div>

        <div
            id="incident-modal"
            class="incident-modal"
            hidden
            role="dialog"
            aria-modal="true"
            aria-hidden="true"
            aria-labelledby="incident-modal-title"
        >
            <div
                class="incident-modal__backdrop"
                data-close-modal
                tabindex="-1"
            ></div>
            <div class="incident-modal__panel">
                <header class="incident-modal__header">
                    <h2 id="incident-modal-title" class="incident-modal__title">
                        Incident details
                    </h2>
                    <button
                        type="button"
                        class="incident-modal__close"
                        id="incident-modal-close"
                        aria-label="Close"
                    >
                        ×
                    </button>
                </header>
                <div
                    id="incident-modal-body"
                    class="incident-modal__body"
                ></div>
            </div>
        </div>

        <script type="module" src="/js/incidents.js"></script>
        <script type="module" src="/js/dashboard.js"></script>
    </body>
</html>
